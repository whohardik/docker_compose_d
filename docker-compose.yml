services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: testHardy
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:testHardy@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "bunx prisma db push && ./dist/index"